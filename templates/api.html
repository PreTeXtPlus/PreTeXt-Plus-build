<form method="post">
    <input type="hidden" name="token" value="{{token}}">
    {% if title != None %}
    <input name="title" value="{{title}}"><br>
    {% endif %}
    <textarea style="width:100%;height:90%" name="source">{{source}}</textarea>
    <label><input type="checkbox" name="format" value="zip"> Download as ZIP</label><br>
    <button type="submit">Submit</button>
</form>
